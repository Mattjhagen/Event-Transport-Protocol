# HTTP Server - Redirects all traffic to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name eventtransport.space;

    return 301 https://$host$request_uri;
}

# HTTPS Server - Proxies traffic to the Node.js application on port 8081
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name eventtransport.space;

    # SSL Certificates (managed by Certbot / Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/eventtransport.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eventtransport.space/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Production Client & API proxy
    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        
        # Keepalive headers
        proxy_set_header Connection "";
        
        # Proxy Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Dedicated ETP WebSocket proxy rule
    location /api/etp-ws {
        proxy_pass http://127.0.0.1:8081/api/etp-ws;
        proxy_http_version 1.1;
        
        # WebSocket Upgrade Headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WS connections can stay open for a long time
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
